name: Build Linux HR ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build

      - name: Build ISO
        run: sudo ./build.sh

      - name: Rename ISO
        run: |
          iso=$(ls linux-hr-*.iso | head -n1)
          mv "$iso" linux-hr.iso

      - name: Upload ISO as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-hr-iso
          path: linux-hr.iso
          retention-days: 14

      - name: Attach ISO to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: linux-hr.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
