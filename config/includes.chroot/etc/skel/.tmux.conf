# Linux HR tmux theme -- green on black, vi-style keys, mouse on

set -g default-terminal "screen-256color"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vi-style pane navigation / copy mode
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# --- theme ---
set -g status-style bg=black,fg=green
set -g status-left "#[bold]#[fg=green] linux-hr #[default]"
set -g status-left-length 20
set -g status-right "#[fg=green]%H:%M #[fg=colour242]| #[fg=green]#h "
set -g window-status-current-style bg=green,fg=black,bold
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=green
set -g message-style bg=green,fg=black
