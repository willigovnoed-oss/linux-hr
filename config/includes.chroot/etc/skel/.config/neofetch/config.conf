# Linux HR neofetch config -- green accents, trimmed info block
print_info() {
    info title
    info underline

    info "OS" distro
    info "Kernel" kernel
    info "Uptime" uptime
    info "Shell" shell
    info "Terminal" term
    info "CPU" cpu
    info "Memory" memory

    info cols
}

separator="  "
ascii_colors=(2 2 2 2 2 2)
colors=(2 2 2 2 2 2)
bold="on"
underline_enabled="on"
underline_char="-"
gap=2
